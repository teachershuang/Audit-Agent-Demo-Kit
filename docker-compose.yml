version: "3.9"

services:
  redis-stack:
    image: redis/redis-stack:7.2.0-v18
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data

  backend:
    image: python:3.11-slim
    working_dir: /workspace/backend
    command: >
      sh -lc "pip install --no-cache-dir -r requirements.txt &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      REDIS_URL: redis://redis-stack:6379/0
      VITE_API_BASE_URL: http://127.0.0.1:8000
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - redis-stack

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  redis-data:
